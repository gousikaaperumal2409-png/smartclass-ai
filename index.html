<!DOCTYPE html>
<html>
<head>
<title>SmartClass AI</title>

<!-- Face API library -->
<script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.0.3/dist/face-api.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

video {
    width: 85%;
    border-radius: 10px;
    margin-top: 20px;
}

#info {
    font-size: 22px;
    margin-top: 20px;
}

#riskBar {
    width: 80%;
    height: 20px;
    background: #444;
    margin: 20px auto;
    border-radius: 10px;
}

#riskFill {
    height: 100%;
    width: 10%;
    background: lime;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1>🏫 SmartClass AI</h1>
<h2>Real-Time Classroom Occupancy Monitoring</h2>

<button onclick="startCamera()">Start Camera</button>
<button onclick="switchCamera()">Switch Camera</button>

<br>

<video id="video" autoplay muted></video>

<div id="info">
<p>Students detected: <span id="count">0</span></p>
<p>Occupancy: <span id="occupancy">0%</span></p>
<p>Status: <span id="status">SAFE</span></p>
<p>Energy Advice: <span id="energy">Normal usage</span></p>
</div>

<h3>Crowd Risk Level</h3>
<div id="riskBar">
<div id="riskFill"></div>
</div>

<script>
let video = document.getElementById("video");
let useFront = true;
let detectionInterval;

// Load Face API model from working CDN
async function loadModels() {
    await faceapi.nets.tinyFaceDetector.loadFromUri('https://rawcdn.githack.com/justadummy/face-api-models/main');
}
loadModels();

async function startCamera() {
    if(detectionInterval) clearInterval(detectionInterval);

    let stream = await navigator.mediaDevices.getUserMedia({
        video: {facingMode: useFront ? "user" : "environment"}
    });
    video.srcObject = stream;

    video.onloadedmetadata = () => {
        video.play();
        startDetection();
    };
}

function switchCamera() {
    useFront = !useFront;
    startCamera();
}

function startDetection() {
    detectionInterval = setInterval(async () => {

        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
        let studentCount = detections.length;

        document.getElementById("count").innerText = studentCount;
        let occupancy = studentCount * 5;
        document.getElementById("occupancy").innerText = occupancy + "%";

        let status = "SAFE";
        if(studentCount > 5) status = "MEDIUM";
        if(studentCount > 10) {
            status = "OVERLOAD";
            alertUser();
        }
        document.getElementById("status").innerText = status;

        document.getElementById("energy").innerText = (studentCount < 4) ? "Reduce lights and AC" : "Normal usage";

        updateRisk(studentCount);

    }, 1000);
}

function updateRisk(students) {
    let width = (students * 8);
    document.getElementById("riskFill").style.width = width+"%";

    if(students < 4) document.getElementById("riskFill").style.background = "lime";
    else if(students < 8) document.getElementById("riskFill").style.background = "orange";
    else document.getElementById("riskFill").style.background = "red";
}

function alertUser() {
    let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    audio.play();

    if(Notification.permission !== "granted") {
        Notification.requestPermission();
    }

    new Notification("SmartClass Alert", {
        body: "Too many students in classroom!"
    });
}
</script>

</body>
</html>
